<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3_回调ref的执行调用次数问题</title>
</head>
<body>
    <div id="test"></div>
    <script src="../js/react.development.js"></script>
    <script src="../js/react-dom.development.js"></script>
    <script src="../js/babel.min.js"></script>
    <script type="text/babel">
        //创建组件
        class Demo extends React.Component{
            render(){
                return(
                    <div>
                        <input ref={ref => this.inputRef = ref} type="text" placeholder="点击按钮提示数据"/>&nbsp;
                        <button onClick={this.showData}>点我提示数据</button>&nbsp;
                        <input ref={ref => this.inputRef2 = ref} onBlur={this.showData2} type="text" placeholder="失去焦点提示数据"/>
                    </div>
                )
            }
            showData = () =>{
                alert(this.inputRef.value)
            }
            showData2 = () =>{
                alert(this.inputRef2.value)
            }
        }
        ReactDOM.render(<Demo/>, document.getElementById("test"))
    </script>
</body>
</html>
