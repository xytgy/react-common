<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2_props的基本使用</title>
</head>
<body>
    <!--准备好一个容器-->
    
    <div id="test"></div>
    <div id="test1"></div>
    <div id="test2"></div>
    <!--引入react相关的js文件-->
    <script src="../js/react.development.js"></script>
    <script src="../js/react-dom.development.js"></script>
    <script src="../js/babel.min.js"></script>
    <script type="text/babel">
       //创建类式组件
       class Person extends React.Component {
            render() {
                const {name, age} = this.props
                return (
                    <ul>
                        <li>姓名：{name}</li>
                        <li>年龄：{age}</li>
                    </ul>
                )
            }
           }
        ReactDOM.render(<Person name="李四" age={18}/>, document.getElementById("test1"))
        ReactDOM.render(<Person name="王五" age={20}/>, document.getElementById("test2"))
        const p = {name: "张三", age : 10}
        //ReactDOM.render(<Person name={p.name} age={p.age}/>, document.getElementById("test2"))
        //语法糖：...p 表示把p对象中的所有属性都传递给Person组件
        ReactDOM.render(<Person {...p}/>, document.getElementById("test"))
    </script>
</body>
</html>
