<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1_类的基本知识</title>
</head>
<body>
    <!--准备好一个容器-->
    <div id="test"></div>
    <script type="text/javascript">
        //1.类的基本语法
        //(1)类的定义
        //类是一种特殊的函数,类的定义和函数的定义很相似
        //类的定义有两种方式:
        //(1)类声明
        //(2)类表达式
        class Person {
            constructor(name, age) {
                this.name = name
                this.age = age
            }

            //一般方法
            say() {
                console.log(`我的名字是${this.name},我今年${this.age}岁`)
            }
        }
        
        //创建一个Student类
        class Student extends Person {
            constructor(name, age, score) {
                super(name, age)
                this.score = score
            }
            //重写父类的方法
            say() {
                console.log(`我的名字是${this.name},我今年${this.age}岁,我的成绩是${this.score}`)
            }
        }
        //创建一个对象
        


        class Car {
            constructor(brand, model) {
                this.brand = brand
                this.model = model
            }
            wheel = 4
        }

        const car = new Car("奔驰", "E300")
        console.log(car)
    </script>
</body>
</html>
